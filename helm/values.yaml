
# 全局配置
global:
  nameOverride: ""
  fullnameOverride: ""

# 后端服务配置
backend:
  # 副本数
  replicaCount: 2
  
  # 镜像配置
  image:
    repository: ghcr.io/huang-song-liang/sushi-digital-human
    tag: latest
    pullPolicy: Always
  
  # 资源配置
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
  
  # 环境变量
  env:
    # DashScope API Key（建议通过 Secret 管理）
    DASHSCOPE_API_KEY: ""
    
    # 模型配置
    EMBEDDING_MODEL: "text_embedding_v2"
    LLM_MODEL: "qwen-max"
    
    # 数据库配置（如果使用外部数据库）
    MYSQL_HOST: ""
    MYSQL_PORT: "3306"
    MYSQL_USER: "root"
    MYSQL_PASSWORD: "7531188"
    MYSQL_DATABASE: "sushi"
    
    # Redis 配置（如果使用外部 Redis）
    REDIS_URL: ""
    
    # 应用配置
    DEBUG: "false"
    LOG_LEVEL: "INFO"
  
  # 健康检查配置
  livenessProbe:
    enabled: true
    path: /health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
  
  readinessProbe:
    enabled: true
    path: /health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
  
  # 服务配置
  service:
    type: ClusterIP
    port: 8000
    annotations: {}
  
  # 自动扩缩容配置
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Redis 配置（内置）
redis:
  enabled: true
  architecture: standalone
  
  master:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  
  auth:
    enabled: true
    password: ""
  
  persistence:
    enabled: true
    size: 10Gi

# MySQL 配置（内置）
mysql:
  enabled: false
  
  auth:
    rootPassword: ""
    database: "sushi"
    username: "sushi"
    password: ""
  
  primary:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
  
  persistence:
    enabled: true
    size: 20Gi

# Nginx Ingress 配置
ingress:
  enabled: false
  className: ""
  
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  
  hosts:
    - host: sushi.example.com
      paths:
        - path: /
          pathType: Prefix
  
  tls: []
    # - secretName: sushi-tls
    #   hosts:
    #     - sushi.example.com

# 监控配置
monitoring:
  enabled: false
  
  # Prometheus ServiceMonitor
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
  
  # Grafana Dashboard
  grafana:
    enabled: false
    dashboard:
      enabled: false

# 日志配置
logging:
  enabled: true
  level: INFO
  format: json

# 安全配置
security:
  # Pod 安全上下文
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  
  # 容器安全上下文
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# 网络策略
networkPolicy:
  enabled: false
  allowExternal: true

# 节点选择器
nodeSelector: {}

# 容忍度
tolerations: []

# 亲和性配置
affinity: {}
