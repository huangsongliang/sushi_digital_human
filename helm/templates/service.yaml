apiVersion: v1
kind: Service
metadata:
  name: {{ include "sushi-digital-human.fullname" . }}
  labels:
    {{- include "sushi-digital-human.labels" . | nindent 4 }}
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sushi-digital-human.selectorLabels" . | nindent 4 }}