apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sushi-digital-human.fullname" . }}-api
  labels:
    {{- include "sushi-digital-human.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "sushi-digital-human.apiSelectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "sushi-digital-human.apiSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: {{ include "sushi-digital-human.fullname" . }}-config
          env:
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sushi-digital-human.fullname" . }}-secrets
                  key: dashscope-api-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sushi-digital-human.fullname" . }}-secrets
                  key: secret-key
            {{- if .Values.mysql.enabled }}
            - name: MYSQL_PASSWORD
              value: ""
            {{- end }}
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.liveness.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelay }}
            periodSeconds: {{ .Values.healthCheck.liveness.period }}
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readiness.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelay }}
            periodSeconds: {{ .Values.healthCheck.readiness.period }}
            timeoutSeconds: 15
            failureThreshold: 5
