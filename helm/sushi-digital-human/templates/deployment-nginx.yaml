apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sushi-digital-human.fullname" . }}-nginx
  labels:
    {{- include "sushi-digital-human.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  replicas: {{ .Values.replicaCount.nginx }}
  selector:
    matchLabels:
      {{- include "sushi-digital-human.nginxSelectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "sushi-digital-human.nginxSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: frontend-dist
              mountPath: /usr/share/nginx/html
          resources:
            {{- toYaml .Values.resources.nginx | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "sushi-digital-human.fullname" . }}-nginx
        - name: frontend-dist
          emptyDir: {}
      initContainers:
        - name: copy-frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              if [ -d /app/frontend/dist ] && [ "$(ls /app/frontend/dist 2>/dev/null | head -1)" ]; then
                echo "Copying frontend dist..."
                cp -r /app/frontend/dist/* /shared/
                echo "Frontend dist copied successfully"
                ls -la /shared/
              else
                echo "WARNING: No frontend/dist found in image, creating empty index.html"
                echo "<h1>Frontend not built</h1><p>Run: cd frontend && npm run build</p>" > /shared/index.html
              fi
          volumeMounts:
            - name: frontend-dist
              mountPath: /shared
