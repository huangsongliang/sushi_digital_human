apiVersion: v1
kind: Service
metadata:
  name: {{ include "sushi-digital-human.fullname" . }}-nginx
  labels:
    {{- include "sushi-digital-human.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.nginx.type }}
  ports:
    - port: {{ .Values.service.nginx.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sushi-digital-human.nginxSelectorLabels" . | nindent 4 }}
