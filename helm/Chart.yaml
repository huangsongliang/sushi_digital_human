  - name: huangsongliang
    email: huangsongliang@example.com

icon: https://raw.githubusercontent.com/huang-song-liang/sushi_digital_human/main/docs/images/logo.png

dependencies:
  - name: redis
    version: 17.3.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
