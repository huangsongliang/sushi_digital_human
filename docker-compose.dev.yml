# Docker Compose 配置 - 开发环境（轻量级）
# 包含：Redis + API + Nginx（前端热重载）
services:
  redis:
    image: redis:7-alpine
    container_name: sushi-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sushi-dev-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: sushi-api-dev
    environment:
      - ENV=development
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS_STORAGE=true
      - LOG_LEVEL=debug
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sushi-dev-network

  nginx:
    image: nginx:alpine
    container_name: sushi-nginx-dev
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - sushi-dev-network

networks:
  sushi-dev-network:
    driver: bridge
