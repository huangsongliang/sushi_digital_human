# Docker Compose 配置 - 生产环境完整部署
# 包含：Redis + API (多实例) + Nginx 负载均衡 + 前端
services:
  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: sushi-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - sushi-network

  # ==================== API 服务 (可水平扩展) ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - ENV=production
      - UVICORN_WORKERS=4
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS_STORAGE=true
      - LOG_LEVEL=info
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 768M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - sushi-network

  # ==================== Nginx 负载均衡和反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: sushi-nginx
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - sushi-network

# ==================== 网络配置 ====================
networks:
  sushi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==================== 数据卷 ====================
volumes:
  redis-data:
    driver: local
  nginx-logs:
    driver: local