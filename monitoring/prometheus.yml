global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "sushi-api"
    static_configs:
      - targets: ["host.docker.internal:8000", "172.17.0.1:8000", "backend:8000", "api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 5s
