repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        files: ^backend/memory/multi_level_cache\.py|backend/utils/circuit_breaker\.py|backend/utils/request_batcher\.py
      - id: end-of-file-fixer
        files: ^backend/memory/multi_level_cache\.py|backend/utils/circuit_breaker\.py|backend/utils/request_batcher\.py