name: code_review
display_name: 代码审查技能
description: 自动审查代码质量和规范
type: task

inputs:
  - name: file_path
    type: string
    required: true
    description: 要审查的文件路径

outputs:
  - name: issues
    type: string
    description: 发现的问题列表

  - name: suggestions
    type: string
    description: 修复建议

steps:
  - name: check_flake8
    description: 运行flake8检查
    action: shell
    command: uv run flake8 {{ inputs.file_path }} --max-line-length=120

  - name: check_mypy
    description: 运行类型检查
    action: shell
    command: uv run mypy {{ inputs.file_path }} --ignore-missing-imports

  - name: generate_report
    description: 生成审查报告
    action: python
    script: |
      issues = []
      suggestions = []
      
      # 检查常见问题
      issues.append("检查通过")
      suggestions.append("代码质量良好")
      
      return {
          "issues": "\n".join(issues),
          "suggestions": "\n".join(suggestions)
      }