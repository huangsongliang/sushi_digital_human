name: 标准开发流程（含CI/CD）
description: 企业级文档问答平台标准开发工作流，包含CI/CD检查和自动修复
version: 2.0

steps:
  - id: requirement_analysis
    name: 需求分析
    description: 理解用户需求，确认技术方案
    prompt: |
      请详细分析以下需求：
      - 用户需求：{{ requirement }}
      - 技术方案：请提供技术实现方案
      - 风险评估：请列出潜在风险

  - id: code_writing
    name: 代码编写
    description: 按照规范编写代码
    prompt: |
      请按照以下规范编写代码：
      - 严格遵守PEP8代码规范
      - Vue代码保持响应式，禁止直接解构Pinia store
      - 所有函数必须有类型注解
      - 代码必须通过flake8检查
      
      实现需求：{{ requirement }}

  - id: code_review
    name: 代码审查
    description: 自动检查代码规范
    action: command
    command: /代码规范检查

  - id: auto_fix
    name: 自动修复
    description: 修复代码规范问题
    action: command
    command: /自动修复代码

  - id: testing
    name: 测试验证
    description: 运行单元测试
    action: command
    command: /运行单元测试

  - id: cicd_check
    name: CI/CD检查
    description: 运行完整CI/CD流程，等待结果
    prompt: |
      请运行完整的CI/CD检查流程：
      1. 代码风格检查 (flake8)
      2. 类型检查 (mypy)
      3. 单元测试 (pytest)
      4. 集成测试
      
      请提供检查结果。

  - id: result_analysis
    name: 结果分析
    description: 根据CI/CD结果判断是否成功
    prompt: |
      请分析CI/CD检查结果：
      
      如果检查通过：
      - ✅ 继续提交确认流程
      
      如果检查失败：
      - ❌ 分析错误日志
      - ❌ 定位问题代码
      - ❌ 提出修复方案
      
      请给出详细的分析报告。

  - id: fix_errors
    name: 错误修复
    description: 如果CI/CD失败，根据错误日志修复代码
    prompt: |
      根据CI/CD错误日志修复代码：
      
      错误信息：{{ error_logs }}
      
      请：
      1. 分析错误原因
      2. 修改相关代码
      3. 重新运行测试验证修复

  - id: confirmation
    name: 提交确认
    description: 确认代码可以提交
    prompt: |
      请确认以下内容：
      - ✅ 代码规范检查通过
      - ✅ 单元测试通过
      - ✅ CI/CD检查通过
      - ✅ 功能实现完整
      
      是否可以提交代码？