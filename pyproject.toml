[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
pythonpath = ["."]

[tool.flake8]
max-line-length = 120
ignore = ["E501", "W503"]
exclude = ["__pycache__", ".git", "*.pyc", "*.egg-info", "frontend/*"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "silent"
strict = false
exclude = ["tests/*", "frontend/*"]

[tool.coverage.run]
source = ["backend"]
omit = ["backend/__init__.py", "backend/*/__init__.py"]

[tool.coverage.report]
show_missing = true
fail_under = 80