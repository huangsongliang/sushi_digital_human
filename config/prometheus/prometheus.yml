# Prometheus 配置文件
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # 监控 Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 监控 API 服务 - 支持多种方式
  - job_name: 'sushi-api'
    scrape_interval: 5s
    static_configs:
      - targets: ['api:8000', 'host.docker.internal:8000', '172.17.0.1:8000']
    metrics_path: /metrics

  # 监控 Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # 监控 Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /nginx_status

  # 监控 Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

remote_write: []
remote_read: []
