# Nginx Upstream 配置 - API 服务负载均衡

upstream sushi_api_backend {
    # 负载均衡策略：加权轮询
    least_conn;

    # API 实例 1
    server api-1:8000 weight=5 max_fails=3 fail_timeout=30s;

    # API 实例 2
    server api-2:8000 weight=5 max_fails=3 fail_timeout=30s;

    # API 实例 3
    server api-3:8000 weight=5 max_fails=3 fail_timeout=30s;

    # API 实例 4
    server api-4:8000 weight=5 max_fails=3 fail_timeout=30s;

    # 保持连接
    keepalive 32;
}

# 上游服务器超时配置
upstream sushi_api_backend {
    least_conn;
    server api-1:8000 weight=5 max_fails=3 fail_timeout=30s;
    server api-2:8000 weight=5 max_fails=3 fail_timeout=30s;
    server api-3:8000 weight=5 max_fails=3 fail_timeout=30s;
    server api-4:8000 weight=5 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # ==================== 健康检查端点 ====================
    location /health {
        proxy_pass http://sushi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 健康检查配置
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;

        access_log off;
    }

    # ==================== API 路由 ====================
    location /api/ {
        # 限流
        limit_req zone=api burst=20 nodelay;
        limit_conn addr 10;

        # 代理设置
        proxy_pass http://sushi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 90s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # 重试配置
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
    }

    # ==================== SSE 流式响应 ====================
    location /api/chat/stream {
        # 不使用限流（流式响应需要长连接）
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://sushi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必须的配置
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # 超时配置（流式响应需要更长超时）
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # 关闭缓冲（实时推送）
        proxy_buffering off;
        proxy_cache off;
    }

    # ==================== 根路径 ====================
    location / {
        proxy_pass http://sushi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==================== 监控端点 ====================
    location /metrics {
        proxy_pass http://sushi_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;

        access_log off;
    }

    # ==================== 错误页面 ====================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
