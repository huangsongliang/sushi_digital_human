            - paragraph [ref=e294]: 用于过滤和筛选。 【Index（索引）】 加速向量检索的数据结构。常见索引类型： - Flat：暴力搜索，准确但慢 - HNSW：近似最近邻，速度快，精度高 - IVF：倒排文件索引，适合大规模数据用于过滤和筛选。 【Index（索引）】 加速向量检索的数据结构。常见索引类型： - Flat：暴力搜索，准确但慢 - HNSW：近似最近邻，速度快，精度高 - IVF：倒排文件索引，适合大规模数据 【Distance Metric（距离度量）】 衡量向量相似度的方法： - Cosine Similarity（余弦相似度）：最常用 - Euclidean Distance（欧氏距离） - Dot Product（点积） 七、向量检索的工作流程 1. 用户输入查询："什么是机器学习？" 2. 使用嵌入模型将查询转换为向量：[0.1, -0.2, 0.3, ...] 3. 在向量数据库中执行相似度搜索 4. 返回最相似的 K 个向量及其对应的文档 5. 将这些文档作为上下文提供给大模型 6. 大模型生成最终答案 八、优化向量检索的技巧 【1. 选择合适的分块大小】 - 太小：丢失上下文信息 - 太大：引入无关信息 - 建议：500-1000 字符，重叠 50-200 字符 【2. 调整检索数量（K 值）】 - K 太小：可能遗漏相关信息 - K 太大：引入噪声，增加成本 - 建议：3-10 个文档块
