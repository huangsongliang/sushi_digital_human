<!DOCTYPE html>
<html>
<head>
    <title>GitHub 登录测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .button {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: scale(1.05);
        }
        .button.github {
            background: #333;
        }
    </style>
</head>
<body>
    <h1 style="color: white; margin-bottom: 30px;">GitHub 登录测试</h1>
    <button class="button github" onclick="window.location.href='http://localhost:8000/api/auth/github/redirect'">
        🐙 GitHub 登录
    </button>
    <p style="color: white; margin-top: 20px; font-size: 14px;">
        点击按钮应该跳转到 GitHub 授权页面
    </p>
</body>
</html>
