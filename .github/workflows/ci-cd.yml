name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DOCKER_REGISTRY: "ghcr.io"

jobs:
  # ==================== 后端代码质量 ====================
  backend-lint:
    name: "🐍 Backend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run flake8
        run: uv run flake8 backend/

      - name: Run mypy
        run: uv run mypy backend/ || true

  # ==================== 前端代码质量 ====================
  frontend-lint:
    name: "🖥️ Frontend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: frontend
        run: npx vue-tsc --noEmit

  # ==================== 后端测试 ====================
  backend-test:
    name: "🐍 Backend Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-lint]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short --cov=backend --cov-report=xml
        env:
          REDIS_URL: redis://localhost:6379/0
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short --timeout=120
        env:
          REDIS_URL: redis://localhost:6379/0
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  # ==================== 前端构建 ====================
  frontend-build:
    name: "🖥️ Frontend Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ==================== Docker 镜像构建推送 ====================
  build-and-push:
    name: "🐳 Build & Push Docker"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend:latest
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
          build-args: |
            PYPI_MIRROR=https://pypi.tuna.tsinghua.edu.cn/simple
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Helm 部署到 K8s ====================
  helm-deploy:
    name: "☸️ Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Helm Deploy
        run: |
          helm upgrade --install sushi-digital-human helm/sushi-digital-human \
            --namespace sushi-prod \
            --create-namespace \
            --values helm/sushi-digital-human/values-production.yaml \
            --set image.repository=${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend \
            --set image.tag=${{ github.sha }} \
            --set secrets.dashscopeApiKey=${{ secrets.DASHSCOPE_API_KEY }} \
            --set secrets.secretKey=${{ secrets.SECRET_KEY }} \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/sushi-digital-human-api -n sushi-prod --timeout=5m
          kubectl rollout status deployment/sushi-digital-human-nginx -n sushi-prod --timeout=5m

  # ==================== Docker Compose 集成测试 ====================
  compose-test:
    name: "🐳 Docker Compose Test"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose -f docker-compose.prod.yml up -d redis api
          sleep 30

      - name: Health check
        run: |
          curl -fsS --retry 10 --retry-delay 5 http://localhost:8080/health
          echo "✅ Health check passed"

      - name: Chat endpoint test
        run: |
          curl -fsS -X POST http://localhost:8080/api/chat/send \
            -H "Content-Type: application/json" \
            -d '{"message": "Hello", "session_id": "test"}'
          echo "✅ Chat endpoint test passed"

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
