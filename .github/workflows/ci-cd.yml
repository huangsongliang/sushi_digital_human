name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DOCKER_REGISTRY: "ghcr.io"

permissions:
  contents: read
  packages: write

jobs:
  # ==================== 后端代码质量 ====================
  backend-lint:
    name: "Backend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 backend/

  # ==================== 前端代码质量 ====================
  frontend-lint:
    name: "Frontend Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ==================== 后端测试 ====================
  backend-test:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-lint]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create virtual environment
        run: uv venv

      - name: Install runtime deps (no ML)
        run: |
          uv pip install \
            fastapi uvicorn pydantic pydantic-settings \
            langchain langchain-core langchain-community \
            httpx requests \
            redis sqlalchemy alembic aiomysql aiosqlite \
            loguru jieba rank-bm25 chromadb dashscope \
            python-jose passlib argon2-cffi email-validator \
            python-dotenv prometheus-client psutil \
            python-multipart cachetools pybreaker

      - name: Install test deps
        run: uv pip install pytest pytest-cov pytest-asyncio pytest-timeout httpx

      - name: Install backend package
        run: uv pip install -e . --no-deps

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short --cov=backend --cov-report=xml --cov-fail-under=35 --timeout=60
        env:
          REDIS_URL: redis://localhost:6379/0
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short --timeout=60
        env:
          REDIS_URL: redis://localhost:6379/0
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  # ==================== 前端构建 ====================
  frontend-build:
    name: "Frontend Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ==================== Docker 镜像构建推送 (仅 main 分支 push) ====================
  build-and-push:
    name: "Build & Push Docker"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /usr/share/swift
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.actor }}/sushi-backend:latest
            ${{ env.DOCKER_REGISTRY }}/${{ github.actor }}/sushi-backend:${{ github.sha }}
          build-args: |
            PYPI_MIRROR=https://pypi.tuna.tsinghua.edu.cn/simple
          cache-from: type=gha
          cache-to: type=gha,mode=max
