name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  lint-and-build:
    name: "🖥️ Lint & Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
